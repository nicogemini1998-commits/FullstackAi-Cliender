server {
    listen 80;
    server_name leadup.cliender.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name leadup.cliender.com;

    ssl_certificate     /etc/letsencrypt/live/leadup.cliender.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/leadup.cliender.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options       DENY always;
    add_header X-Content-Type-Options nosniff always;

    # Health checks
    location = /health        { proxy_pass http://127.0.0.1:8002/health; }
    location = /runner/health { proxy_pass http://127.0.0.1:8001/health; }

    # LeadUp API
    location /api/ {
        proxy_pass         http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Agent Runner API (interno)
    location /runner/ {
        proxy_pass         http://127.0.0.1:8001/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 300s;
    }

    # WebSockets agent runner
    location /runner/api/execute/ws/ {
        proxy_pass          http://127.0.0.1:8001/api/execute/ws/;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection upgrade;
        proxy_set_header    Host       $host;
        proxy_read_timeout  3600s;
    }

    # Frontend React (SPA)
    location / {
        root  /var/www/leadup-frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
        location ~* \.(js|css|png|jpg|svg|ico|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;
}

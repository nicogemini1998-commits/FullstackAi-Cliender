# LeadUp CRM — leadup.cliender.com
# Colocar en /etc/nginx/sites-available/leadup.cliender.com
# Activar: ln -s /etc/nginx/sites-available/leadup.cliender.com /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name leadup.cliender.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name leadup.cliender.com;

    # Certificados Let's Encrypt (certbot los genera)
    ssl_certificate     /etc/letsencrypt/live/leadup.cliender.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/leadup.cliender.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options       "DENY"              always;
    add_header X-Content-Type-Options "nosniff"          always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # LeadUp API → FastAPI :8002
    location /api/ {
        proxy_pass         http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Agent Runner API → FastAPI :8001 (solo acceso interno/admin)
    location /runner/ {
        # Restringir a IPs internas — descomenta si necesitas acceso externo
        # allow 185.97.144.72;
        # deny all;
        proxy_pass         http://127.0.0.1:8001/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # Agent Runner WebSockets
    location /runner/api/execute/ws/ {
        proxy_pass          http://127.0.0.1:8001/api/execute/ws/;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_read_timeout  3600s;
    }

    # LeadUp Frontend → dist estático
    location / {
        root  /var/www/leadup-frontend;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache assets con hash
        location ~* \.(js|css|png|jpg|svg|ico|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;
}
